<div class="login-branding">
  <img src="/logo-construferreteria.png" alt="Logo Construferreteria El Buen Precio" class="login-logo">
  <h2 class="login-title">CONSTRUFERRETERIA EL BUEN PRECIO</h2>
</div>
<form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
  <div class="form-group">
    <label for="username">Usuario</label>
    <input type="text" id="username" name="username" [(ngModel)]="username" required class="form-control">
  </div>
  <div class="form-group">
    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" [(ngModel)]="password" required class="form-control">
  </div>
  <button type="submit" class="btn btn-primary" [disabled]="loading">Iniciar sesión</button>
  <div *ngIf="error" class="alert alert-danger mt-2">{{ error }}</div>
</form>
